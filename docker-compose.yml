version: '3.9'

# jp: 공시탐정 ai - 전체 스택 Docker Compose
# jp: 서비스: backend, frontend(nginx), postgres, redis

services:
  # ─────────────────────────────────────────
  # jp: PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gongsi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gongsi_db}
      POSTGRES_USER: ${POSTGRES_USER:-gongsi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gongsi_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gongsi_user} -d ${POSTGRES_DB:-gongsi_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gongsi_net

  # ─────────────────────────────────────────
  # jp: Redis (캐시 + Pub/Sub + BullMQ)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gongsi_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
     --maxmemory-policy noeviction
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - gongsi_net

  # ─────────────────────────────────────────
  # jp: Backend (Node.js Express)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: gongsi_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-gongsi_db}
      DB_USER: ${POSTGRES_USER:-gongsi_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-gongsi_pass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 4000
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - gongsi_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # jp: Frontend (Nginx + React 빌드)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: gongsi_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - gongsi_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# ─────────────────────────────────────────
# jp: 볼륨 (데이터 영속성)
# ─────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─────────────────────────────────────────
# jp: 네트워크
# ─────────────────────────────────────────
networks:
  gongsi_net:
    driver: bridge
