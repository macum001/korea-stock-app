name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # jp: 백엔드 빌드 + 타입체크
  # ─────────────────────────────────────────
  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript 타입체크
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────
  # jp: 프론트엔드 빌드 + 타입체크
  # ─────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript 타입체크
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────
  # jp: Docker 이미지 빌드 테스트
  # ─────────────────────────────────────────
  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Backend Docker 빌드 테스트
        run: docker build --target production -t gongsi-backend:test ./backend

      - name: Frontend Docker 빌드 테스트
        run: docker build -t gongsi-frontend:test ./frontend
