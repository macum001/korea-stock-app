name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # jp: Docker Hub에 이미지 푸시
      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker 이미지 빌드 & 푸시 (Backend)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gongsi-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/gongsi-backend:${{ github.sha }}

      - name: Docker 이미지 빌드 & 푸시 (Frontend)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gongsi-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/gongsi-frontend:${{ github.sha }}

      # jp: 서버에 SSH 접속 후 docker-compose pull & up
      - name: 서버 배포 (SSH)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /app/korea-stock-app
            docker-compose pull
            docker-compose up -d --no-build
            docker image prune -f
            echo "✅ 배포 완료: $(date)"
