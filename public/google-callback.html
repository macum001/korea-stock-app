<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>구글 로그인 처리 중...</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e5e7eb;
    }
    .box { text-align: center; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(66,133,244,0.3);
      border-top-color: #4285F4;
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>구글 로그인 처리 중...</p>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    var error = params.get('error');

    if (window.opener) {
      if (error) {
        window.opener.postMessage({ type: 'GOOGLE_AUTH_ERROR', error: error }, window.location.origin);
      } else if (code) {
        window.opener.postMessage({ type: 'GOOGLE_AUTH_SUCCESS', code: code }, window.location.origin);
      }
      window.close();
    } else {
      document.querySelector('.box p').textContent = '이 창은 구글 로그인 전용이에요. 앱에서 다시 시도해주세요.';
    }
  </script>
</body>
</html>
