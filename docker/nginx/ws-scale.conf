# jp: 다중 realtime 서버 WebSocket 부하분산 설정
# jp: Docker DNS의 tasks/realtime가 여러 컨테이너를 반환한다.
upstream realtime_ws {
  zone realtime_ws 64k;
  server realtime:4000 resolve;
}

server {
  listen 80;

  location /health {
    proxy_pass http://realtime_ws/health;
  }

  location /ws {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://realtime_ws/ws;
  }
}
